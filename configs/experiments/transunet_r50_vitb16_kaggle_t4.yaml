_base_: ../base.yaml

model:
  name: transunet
  transunet_variant: r50_vit_b16
  encoder_name: r50_vit_b16
  encoder_weights: imagenet
  pretrained_path: null
  decoder_channels: [256, 128, 64, 16]
  skip_channels: [512, 256, 64, 16]
  n_skip: 3
  in_channels: 3
  classes: 1
  decoder_attention_type: null
  vit_hidden_size: 768
  vit_mlp_dim: 3072
  vit_num_heads: 12
  vit_num_layers: 12
  vit_dropout_rate: 0.1
  vit_attention_dropout_rate: 0.0

training:
  batch_size: 4
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  deterministic: false
  find_unused_parameters: false
  differential_lr:
    enabled: false

lr_schedule:
  scheduler: cosine
  warmup_epochs: 5
  warmup_start_lr: 1.0e-6
  min_lr: 1.0e-6

data:
  input_size: [256, 256]
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  val_batch_size_multiplier: 1

logging:
  experiment_name: transunet_r50_vitb16_kaggle_t4
