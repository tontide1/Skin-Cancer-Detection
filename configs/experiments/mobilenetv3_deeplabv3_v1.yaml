# =============================================================================
# Experiment: mobilenetv3_deeplabv3_v1
# DeepLabV3 + MobileNetV3-Large backbone (torchvision pretrained)
# So sánh với U-Net + ResNet34 baseline
# =============================================================================

_base_: ../base.yaml

model:
  name: deeplabv3
  encoder_name: mobilenet_v3_large # informational, dùng cho logging
  encoder_weights: imagenet # "imagenet" → COCO pretrained weights

training:
  batch_size: 64 # MobileNetV3 nhẹ → có thể tăng batch
  lr: 1.0e-3 # higher LR cho lightweight backbone

logging:
  experiment_name: mobilenetv3_deeplabv3_v1
